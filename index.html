<style>
  body {
    background-color: #11141a;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .card {
    background-color: #1e222b;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    text-align: center;
    max-width: 350px;
  }

  h1 {
    color: #ff9f1c;
    margin-top: 0;
    font-size: 28px;
    text-transform: lowercase; /* باش تبقى السمية بحال اللوغو صغير */
  }

  p {
    color: #a0a5b5;
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 20px;
  }

  img {
    width: 100%;
    border-radius: 12px;
    margin-top: 10px;
  }

  a {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 24px;
    background-color: #ff9f1c;
    color: #11141a;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.3s ease;
  }

  a:hover {
    background-color: #ffb703;
    transform: translateY(-2px);
  }
</style>

<!-- هنا بدلنا العناوين باش يولي السيت متناسق -->
<div class="card">
  <h1>voltex-digital</h1>
  <p>the first digital agency in the region</p>
  <img src="pic.png">
  <a href="https://www.google.com">visit our website</a>
</div>
